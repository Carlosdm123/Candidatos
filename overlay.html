<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="style.css">

<script src="https://cdn.ably.com/lib/ably.min-1.js"></script>

</head>

<body>

<!-- MOSCA -->
<iframe
id="moscaOverlay"
src="https://carlosdm123.github.io/mosca-analisis/mosca-overlay.html">
</iframe>

<!-- TITULO ROL -->
<iframe
id="rolesOverlay"
src="https://carlosdm123.github.io/Vmix-lowerthird/overlay.html">
</iframe>

<!-- BANNER -->
<iframe
id="bannerOverlay"
src="https://carlosdm123.github.io/vmix-banner/overlay.html">
</iframe>

<!-- CANDIDATOS -->
<div id="banner" style="opacity:0;">

<div id="box1">
<div id="mask1">

<img src="assets/caja1.png" class="bg">

<img src="" id="candidateImg">

<div id="logoBox">
<img src="assets/logo.png" id="logo">
</div>

</div>
</div>

<div id="box2">
<div id="mask2">

<img src="assets/caja2.png" class="bg">

<div id="textContainer">
<div id="bannerText" style="text-transform:uppercase;"></div>
</div>

</div>
</div>

</div>

<script src="animation.js"></script>

<script>

const ably = new Ably.Realtime("bOKecA.nN4Mxg:fKOSQx66tttgBhzrHuPP0FDYQnvKB8yniR-7J4BY_uo");

const channel = ably.channels.get("candidatos-overlay");

let visible=false;
let changing=false;

function hideImmediately(){

const banner=document.getElementById("banner");

banner.style.opacity="0";

}

hideImmediately();

channel.subscribe("banner",(message)=>{

const data=message.data;

if(data.action==="show"){

const banner=document.getElementById("banner");

const text=data.text;
const candidate=data.candidate;

const candidateImg=document.getElementById("candidateImg");

candidateImg.src="assets/"+candidate;

if(visible){

changing=true;

hideBanner();

setTimeout(()=>{

document.getElementById("bannerText").innerText=text;

banner.style.opacity="1";

startBanner();

visible=true;
changing=false;

},3500);

}else{

document.getElementById("bannerText").innerText=text;

banner.style.opacity="1";

startBanner();

visible=true;

}

}

if(data.action==="hide"){

if(!visible) return;

hideBanner();

setTimeout(()=>{

hideImmediately();
visible=false;

},1500);

}

});

</script>

</body>
</html>
